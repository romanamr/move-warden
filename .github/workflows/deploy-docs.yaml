name: Deploy Vitepress Documentation

on:
    push:
        branches:
            - main

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: [package-lock.json](http://_vscodecontentref_/7)
            - run: npm ci
              working-directory: docs
            - run: npm run docs:build
              working-directory: docs
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: [dist](http://_vscodecontentref_/8)

    deploy:
        needs: build
        environment:
            name: "github-pages"
            url: ${{ steps.deploy-pages.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - id: deployment
              uses: actions/download-pages@v4
